name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      # Fail fast if the release tag and gradle.properties mod.version disagree: the published files
      # and the release label must be the same version.
      - name: Verify the release tag matches gradle.properties
        run: |
          TAG="${{ github.event.release.tag_name }}"
          TAG_VERSION="${TAG#v}"
          MOD_VERSION="$(grep -E '^mod\.version=' gradle.properties | cut -d= -f2 | tr -d '[:space:]')"
          echo "Release tag:                  $TAG (version $TAG_VERSION)"
          echo "gradle.properties mod.version: $MOD_VERSION"
          if [ "$TAG_VERSION" != "$MOD_VERSION" ]; then
            echo "::error::Release tag '$TAG' (version '$TAG_VERSION') does not match gradle.properties mod.version '$MOD_VERSION'. Bump mod.version (or fix the tag) and re-release."
            exit 1
          fi

      - name: Set up JDK 17 + 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            17
            21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Builds every loader/version and collects the remapped jars into build/libs/.
      - name: Build and collect all jars
        run: |
          chmod +x ./gradlew
          ./gradlew chiseledBuildAndCollect --stacktrace

      - name: Attach jars to the GitHub Release
        run: gh release upload "${{ github.event.release.tag_name }}" build/libs/*.jar --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Stonecraft's built-in publishing (mod-publish-plugin) uploads each loader/version as its own
      # correctly-tagged file to Modrinth and CurseForge in one task, reading the notes from
      # CHANGELOG.md. DO_PUBLISH=false flips off dry-run so it actually uploads. Put [skip-stores] in the
      # release notes to attach to GitHub only.
      - name: Publish to Modrinth and CurseForge
        if: ${{ !contains(github.event.release.body, '[skip-stores]') }}
        run: ./gradlew chiseledPublishMods --stacktrace
        env:
          DO_PUBLISH: "false"
          RELEASE_TYPE: release
          MODRINTH_ID: ae2-no-byproduct
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          CURSEFORGE_ID: "1590300"
          CURSEFORGE_SLUG: ae2-no-byproduct
          CURSEFORGE_TOKEN: ${{ secrets.CF_API_TOKEN }}
