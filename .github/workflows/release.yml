name: Release

# Auto-release on version bump. When a change to gradle.properties lands on main and the new
# mod.version has no v<version> tag yet, this builds every loader/version, creates the v<version> GitHub
# Release (jars + changelog notes), and publishes to Modrinth + CurseForge. So a release is just:
# bump mod.version + finalize CHANGELOG, then merge to main. No manual "draft a release" step.
on:
  push:
    branches: [main]
    paths:
      # A version bump always edits gradle.properties; nothing else can trigger a release.
      - gradle.properties
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  release:
    # Only ever release from main, so a manual workflow_dispatch picked on a feature branch cannot
    # publish a release from a tip that never went through the version-bump + changelog flow.
    if: github.ref == 'refs/heads/main'
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      # Derive the version + tag from gradle.properties. If that tag already exists, every later step is
      # skipped, so editing gradle.properties without bumping the version never double-releases.
      - name: Resolve version
        id: ver
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="$(grep -E '^mod\.version=' gradle.properties | cut -d= -f2 | tr -d '[:space:]')"
          TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          # Dedupe on the git tag (release.yml creates the tag + Release together, so the tag is the
          # source of truth); also treat an existing Release as already released. Either present => skip,
          # so a leftover tag without a Release never re-runs the build/publish path.
          if gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$TAG" >/dev/null 2>&1 \
             || gh release view "$TAG" >/dev/null 2>&1; then
            echo "new=false" >> "$GITHUB_OUTPUT"
            echo "Tag/Release $TAG already exists; nothing to do."
          else
            echo "new=true" >> "$GITHUB_OUTPUT"
            echo "Releasing $TAG."
          fi
          # Honour [skip-stores] in the triggering commit message: attach to the GitHub Release only.
          if git log -1 --pretty=%B | grep -qF '[skip-stores]'; then
            echo "skip_stores=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip_stores=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 17 + 21
        if: steps.ver.outputs.new == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            17
            21

      - name: Set up Gradle
        if: steps.ver.outputs.new == 'true'
        uses: gradle/actions/setup-gradle@v4

      # Builds every loader/version and collects the remapped jars into build/libs/.
      - name: Build and collect all jars
        if: steps.ver.outputs.new == 'true'
        run: |
          chmod +x ./gradlew
          ./gradlew chiseledBuildAndCollect --stacktrace

      # Pull this version's section out of CHANGELOG.md for the GitHub Release body.
      - name: Extract changelog notes
        if: steps.ver.outputs.new == 'true'
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          awk -v ver="$VERSION" '
            $0 ~ ("^## \\[" ver "\\]") {f=1; next}
            f && /^## \[/ {exit}
            f {print}
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "See CHANGELOG.md for the full list of changes." > release-notes.md
          fi
          echo "----- release notes -----"; cat release-notes.md

      # Creates the tag + GitHub Release at this commit and attaches every loader/version jar.
      - name: Create the GitHub Release
        if: steps.ver.outputs.new == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.ver.outputs.tag }}" build/libs/*.jar \
            --target "${{ github.sha }}" \
            --title "AE2 No Byproduct ${{ steps.ver.outputs.version }}" \
            --notes-file release-notes.md

      # Stonecraft's mod-publish-plugin uploads each loader/version jar to Modrinth + CurseForge.
      # READ THIS BEFORE CHANGING: DO_PUBLISH is Stonecraft's DRY-RUN flag, not a publish flag, so its
      # value is inverted: "false" -> dryRun=false -> it REALLY uploads (what we want); "true"/unset ->
      # dry run. Keep it "false". To skip the stores for a release, put [skip-stores] in the commit
      # message that bumps the version (the skip_stores guard below), do NOT flip this to "true".
      - name: Publish to Modrinth and CurseForge
        if: steps.ver.outputs.new == 'true' && steps.ver.outputs.skip_stores == 'false'
        run: ./gradlew chiseledPublishMods --stacktrace
        env:
          DO_PUBLISH: "false"
          RELEASE_TYPE: release
          MODRINTH_ID: ae2-no-byproduct
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
          CURSEFORGE_ID: "1590300"
          CURSEFORGE_SLUG: ae2-no-byproduct
          CURSEFORGE_TOKEN: ${{ secrets.CF_API_TOKEN }}
