name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      # Fail fast (before building or publishing) if the release tag and the
      # version in gradle.properties disagree. The published files and the
      # release/CurseForge/Modrinth label must be the same version.
      - name: Verify the release tag matches gradle.properties
        run: |
          TAG="${{ github.event.release.tag_name }}"
          TAG_VERSION="${TAG#v}"
          MOD_VERSION="$(grep -E '^mod_version=' gradle.properties | cut -d= -f2 | tr -d '[:space:]')"
          echo "Release tag:                  $TAG (version $TAG_VERSION)"
          echo "gradle.properties mod_version: $MOD_VERSION"
          if [ "$TAG_VERSION" != "$MOD_VERSION" ]; then
            echo "::error::Release tag '$TAG' (version '$TAG_VERSION') does not match gradle.properties mod_version '$MOD_VERSION'. They must be identical. Bump mod_version (or fix the tag) and re-release."
            exit 1
          fi
          echo "Version check passed: $MOD_VERSION"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Builds every module; the per-loader production jars land in
      # forge/build/libs/ and fabric/build/libs/, each named with its loader and
      # MC version (e.g. ae2nobyproduct-fabric-1.20.1-<version>.jar).
      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew build --stacktrace

      # Single source of truth for the Minecraft version: gradle.properties. Both
      # 1.20.1 jars (forge + fabric) share this game version.
      - name: Read game version from gradle.properties
        id: props
        run: echo "mc=$(grep -E '^minecraft_version=' gradle.properties | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      # Publish BOTH loader jars under one release/version. Modrinth keys a version by its
      # number, so a single call attaches both files (forge + fabric) to version <tag> with
      # loaders [forge, fabric] on the read MC version; users pick the jar by its loader-named
      # filename. The globs keep only the clean remapped jars (exclude -sources and -dev*).
      #
      # By default we publish to GitHub + CurseForge + Modrinth. If the release notes contain
      # [skip-stores] (e.g. that version is already on the stores) the GitHub-only step runs
      # instead and passes NO store credentials. (An empty curseforge-id does NOT skip:
      # mc-publish would auto-detect the project by slug and fail.)
      - name: Publish to GitHub, CurseForge, and Modrinth
        if: ${{ !contains(github.event.release.body, '[skip-stores]') }}
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          curseforge-id: 1590300
          curseforge-token: ${{ secrets.CF_API_TOKEN }}

          modrinth-id: ae2-no-byproduct
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          files: |
            forge/build/libs/!(*-sources|*-dev*).jar
            fabric/build/libs/!(*-sources|*-dev*).jar

          name: ${{ github.event.release.name }}
          version: ${{ github.event.release.tag_name }}
          version-type: release
          changelog: ${{ github.event.release.body }}

          # Loaders come from each jar's own metadata (fabric.mod.json -> fabric,
          # mods.toml -> forge), so every file is tagged with ONLY its own loader. Do NOT
          # set `loaders` here: forcing forge+fabric onto both jars mis-tags them on
          # CurseForge and makes Modrinth reject the forge jar as a Fabric file. game-versions
          # stays pinned because both loaders target the same Minecraft version.
          game-versions: ${{ steps.props.outputs.mc }}
          java: "17"

      - name: Publish to GitHub only (stores skipped via [skip-stores])
        if: ${{ contains(github.event.release.body, '[skip-stores]') }}
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

          files: |
            forge/build/libs/!(*-sources|*-dev*).jar
            fabric/build/libs/!(*-sources|*-dev*).jar

          name: ${{ github.event.release.name }}
          version: ${{ github.event.release.tag_name }}
          version-type: release
          changelog: ${{ github.event.release.body }}

          # Loaders auto-detected per jar (see the comment on the step above).
          game-versions: ${{ steps.props.outputs.mc }}
          java: "17"
