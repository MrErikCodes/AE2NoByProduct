name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      # Fail fast (before building or publishing) if the release tag and the
      # version in gradle.properties disagree. The published files and the
      # release/CurseForge/Modrinth label must be the same version.
      - name: Verify the release tag matches gradle.properties
        run: |
          TAG="${{ github.event.release.tag_name }}"
          TAG_VERSION="${TAG#v}"
          MOD_VERSION="$(grep -E '^mod_version=' gradle.properties | cut -d= -f2 | tr -d '[:space:]')"
          echo "Release tag:                  $TAG (version $TAG_VERSION)"
          echo "gradle.properties mod_version: $MOD_VERSION"
          if [ "$TAG_VERSION" != "$MOD_VERSION" ]; then
            echo "::error::Release tag '$TAG' (version '$TAG_VERSION') does not match gradle.properties mod_version '$MOD_VERSION'. They must be identical. Bump mod_version (or fix the tag) and re-release."
            exit 1
          fi
          echo "Version check passed: $MOD_VERSION"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Builds every module; the per-loader production jars land in
      # forge/build/libs/ and fabric/build/libs/, each named with its loader and
      # MC version (e.g. ae2nobyproduct-fabric-1.20.1-<version>.jar).
      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew build --stacktrace

      # Single source of truth for the Minecraft version: gradle.properties. Both
      # 1.20.1 jars (forge + fabric) share this game version.
      - name: Read game version from gradle.properties
        id: props
        run: echo "mc=$(grep -E '^minecraft_version=' gradle.properties | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      # Publish in three INDEPENDENT steps so one store outage can't block the others.
      # GitHub goes first and always runs (the canonical download; also covers [skip-stores]).
      # Modrinth and CurseForge each run with !cancelled() so a failure in one still lets the
      # other run; the job still reports failure if any step fails, so nothing is hidden.
      # CurseForge is last because its API is the flakiest.
      #
      # Loaders are auto-detected from each jar's own metadata (fabric.mod.json -> fabric,
      # mods.toml -> forge), so every file is tagged with ONLY its own loader. Do NOT set a
      # `loaders` input: forcing both loaders onto both jars mis-tags them on CurseForge and
      # makes Modrinth reject the forge jar as a Fabric file. game-versions is pinned because
      # both loaders target the same Minecraft version. The globs keep only the clean remapped
      # jars (exclude -sources and -dev*). [skip-stores] in the notes = GitHub only.
      - name: Attach jars to the GitHub Release
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          files: |
            forge/build/libs/!(*-sources|*-dev*).jar
            fabric/build/libs/!(*-sources|*-dev*).jar
          name: ${{ github.event.release.name }}
          version: ${{ github.event.release.tag_name }}
          version-type: release
          changelog: ${{ github.event.release.body }}
          game-versions: ${{ steps.props.outputs.mc }}
          java: "17"

      - name: Publish to Modrinth
        if: ${{ !cancelled() && !contains(github.event.release.body, '[skip-stores]') }}
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: ae2-no-byproduct
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          files: |
            forge/build/libs/!(*-sources|*-dev*).jar
            fabric/build/libs/!(*-sources|*-dev*).jar
          name: ${{ github.event.release.name }}
          version: ${{ github.event.release.tag_name }}
          version-type: release
          changelog: ${{ github.event.release.body }}
          game-versions: ${{ steps.props.outputs.mc }}
          java: "17"

      # CurseForge has no multi-loader "version" like Modrinth: each file is independent and carries
      # its own loader tag. A single mc-publish call with both jars groups them under one file with
      # one loader (it mis-tagged the Fabric jar as Forge). So upload each loader's jar in its OWN
      # step with an explicit single loader, producing two correctly-tagged CurseForge files.
      - name: Publish Forge to CurseForge
        if: ${{ !cancelled() && !contains(github.event.release.body, '[skip-stores]') }}
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: 1590300
          curseforge-token: ${{ secrets.CF_API_TOKEN }}
          files: forge/build/libs/!(*-sources|*-dev*).jar
          name: ${{ github.event.release.name }} (Forge)
          version: ${{ github.event.release.tag_name }}
          version-type: release
          changelog: ${{ github.event.release.body }}
          loaders: forge
          game-versions: ${{ steps.props.outputs.mc }}
          java: "17"

      - name: Publish Fabric to CurseForge
        if: ${{ !cancelled() && !contains(github.event.release.body, '[skip-stores]') }}
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: 1590300
          curseforge-token: ${{ secrets.CF_API_TOKEN }}
          files: fabric/build/libs/!(*-sources|*-dev*).jar
          name: ${{ github.event.release.name }} (Fabric)
          version: ${{ github.event.release.tag_name }}
          version-type: release
          changelog: ${{ github.event.release.body }}
          loaders: fabric
          game-versions: ${{ steps.props.outputs.mc }}
          java: "17"
