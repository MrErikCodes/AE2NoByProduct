name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: |
          chmod +x ./gradlew
          ./gradlew build --stacktrace

      # Upload each loader's real mod jar as its own artifact, so the Actions run page
      # lists them separately (the root project only emits an empty placeholder jar).
      # Excludes the -sources and -dev* jars.
      - name: Upload Forge jar
        uses: actions/upload-artifact@v4
        with:
          name: ae2nobyproduct-forge
          path: |
            forge/build/libs/*.jar
            !**/*-sources.jar
            !**/*-dev*.jar
          if-no-files-found: error

      - name: Upload Fabric jar
        uses: actions/upload-artifact@v4
        with:
          name: ae2nobyproduct-fabric
          path: |
            fabric/build/libs/*.jar
            !**/*-sources.jar
            !**/*-dev*.jar
          if-no-files-found: error
