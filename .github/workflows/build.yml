name: Build

on:
  # Build every pull request so code is verified BEFORE it merges.
  pull_request:
  # Build direct pushes to main only when they touch code. Doc, workflow, and config-only commits
  # skip the build (no point rebuilding the mod for a README or CI tweak), which is most of the churn.
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - '.github/**'
      - 'LICENSE'
      - 'logo.*'
      - 'docs/**'
      - '.gitignore'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      # 1.20.1 builds on Java 17, 1.21.1 on Java 21. Install both; Stonecraft's per-version toolchain
      # picks the right one for each node.
      - name: Set up JDK 17 + 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            17
            21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Builds every loader/version (Forge 1.20.1, Fabric 1.20.1, NeoForge 1.21.1) and collects the
      # remapped jars into build/libs/.
      - name: Build all loaders and versions
        run: |
          chmod +x ./gradlew
          ./gradlew chiseledBuildAndCollect --stacktrace

      - name: Upload jars
        uses: actions/upload-artifact@v4
        with:
          name: ae2nobyproduct-jars
          path: build/libs/*.jar
          if-no-files-found: error
